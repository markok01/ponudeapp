services:
  pdf-converter:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${PDF_CONVERTER_API_KEY:-}
      - OCR_ENABLED=${OCR_ENABLED:-true}
      - MAX_PDF_SIZE_MB=${MAX_PDF_SIZE_MB:-50}
      - LOG_LEVEL=INFO
    volumes:
      - pdf_converter_tmp:/tmp/pdf-converter
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  pdf_converter_tmp:
